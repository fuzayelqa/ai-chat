<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.3);
            border-radius: 10px;
        }
        
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }

        /* Message Bubble Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-animate {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Typing Indicator Animation */
        .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin-right: 3px;
            background: currentColor;
            animation: wave 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            0%, 60%, 100% { transform: initial; }
            30% { transform: translateY(-4px); }
        }
    </style>
</head>
<body class="bg-white dark:bg-[#212121] text-gray-900 dark:text-gray-100 h-screen flex overflow-hidden">

    <!-- Sidebar -->

                </div>

        </div>

        <nav class="flex-1 overflow-y-auto custom-scrollbar px-2 space-y-1">

    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative min-w-0">
        <!-- Header -->
        <header class="h-14 flex items-center justify-between px-4 border-b border-gray-200 dark:border-white/10 md:border-none">
            <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 dark:hover:bg-white/10 rounded-lg">

            </div>
            <div class="w-8"></div>
        </header>

        <!-- Chat Area -->
        <section id="chat-container" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col items-center">
            <!-- Welcome State -->
            <div id="welcome-screen" class="w-full max-w-3xl px-4 py-8 space-y-12">
                <div class="text-center pt-20">
                    <h1 class="text-4xl font-semibold mb-8">What can I help with?</h1>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl mx-auto">
                        <button onclick="quickPrompt('Tell me a fun fact')" class="p-4 border border-gray-200 dark:border-white/10 rounded-xl text-left hover:bg-gray-50 dark:hover:bg-white/5 transition">
                            <p class="font-medium text-sm">Fun Facts</p>
                            <p class="text-gray-400 text-xs mt-1">Surprise me with something interesting</p>
                        </button>
                        <button onclick="quickPrompt('Give me a productivity tip')" class="p-4 border border-gray-200 dark:border-white/10 rounded-xl text-left hover:bg-gray-50 dark:hover:bg-white/5 transition">
                            <p class="font-medium text-sm">Productivity</p>
                            <p class="text-gray-400 text-xs mt-1">How can I manage my time better today?</p>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Conversation View -->
            <div id="message-list" class="w-full max-w-3xl px-4 py-8 space-y-6 hidden">
                <!-- Messages will appear here -->
            </div>
        </section>

        <!-- Input Area -->
        <footer class="p-4 pb-8 flex flex-col items-center">
            <div class="w-full max-w-3xl relative">
                <div class="bg-gray-100 dark:bg-[#303030] rounded-3xl p-3 shadow-sm border border-transparent focus-within:border-gray-300 dark:focus-within:border-white/20 transition-all">
                    <textarea 
                        id="user-input"
                        rows="1" 
                        placeholder="Message AI Assistant..." 
                        class="w-full bg-transparent resize-none focus:outline-none px-2 py-1 max-h-48 custom-scrollbar"
                    ></textarea>
                    <div class="flex justify-between items-center mt-2 px-1">
                        <button class="p-2 text-gray-500 hover:bg-gray-200 dark:hover:bg-white/10 rounded-full transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </button>
                        <button id="send-btn" class="p-2 bg-black dark:bg-white text-white dark:text-black rounded-full hover:opacity-80 transition disabled:opacity-30">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center text-gray-500 mt-3 uppercase tracking-widest font-medium">
                    Developed By Ozih Uddin Al Fuzayel • AI can make mistakes.
                </p>
            </div>
        </footer>
    </main>

        let replyIndex = 0;
        let isGenerating = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function appendMessage(text, isUser = false, isTyping = false) {
            if (welcomeScreen.style.display !== 'none') {
                welcomeScreen.style.display = 'none';
                messageList.classList.remove('hidden');
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full message-animate`;
            if (isTyping) messageDiv.id = "typing-indicator";
            
            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[85%] p-4 rounded-2xl text-sm ${
                isUser 
                ? 'bg-gray-100 dark:bg-[#303030] text-gray-800 dark:text-gray-200' 
                : 'bg-transparent text-gray-900 dark:text-gray-100 border border-gray-100 dark:border-white/5 shadow-sm'
            }`;
            
            if (isTyping) {
                innerDiv.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span>`;
            } else {
                innerDiv.innerHTML = `<p class="leading-relaxed whitespace-pre-wrap">${text}</p>`;
            }
            
            messageDiv.appendChild(innerDiv);
            messageList.appendChild(messageDiv);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            return messageDiv;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isGenerating) return;

            isGenerating = true;
            sendBtn.disabled = true;
            appendMessage(text, true);
            userInput.value = '';
            userInput.style.height = 'auto';

            const typingIndicator = appendMessage("", false, true);

            // Simulate AI "Thinking" and return one of 100 replies
            setTimeout(() => {
                typingIndicator.remove();
                const reply = autoReplies[replyIndex];
                appendMessage(reply, false);
                
                // Cycle through 100 replies
                replyIndex = (replyIndex + 1) % autoReplies.length;
                
                isGenerating = false;
                sendBtn.disabled = false;
            }, 1000);
        }

        function quickPrompt(text) {
            userInput.value = text;
            handleSend();
        }

        sendBtn.addEventListener('click', handleSend);
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = e.target.closest('button');
            if (window.innerWidth < 768 && !sidebar.contains(e.target) && !menuBtn) {
                sidebar.classList.add('-translate-x-full');
            }
        });
    </script>
</body>
</html>
